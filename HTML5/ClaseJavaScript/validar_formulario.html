<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS3/validar_formulario.css">
    <title>Valdacion de Formulario JS</title>
</head>
<body>
  <form action="" id="formulario" name="formulario">
    <div class="two-columns">
        <div class="fields">
          <label for="name">Nombre</label>
          <input type="text" id="name" name="name" autocomplete="off">  
        </div>

        <div class="fields">
          <label for="lastname">Apellido</label>
          <input type="text" id="lastname" name="lastname" autocomplete="off">  
        </div>
    </div> 

    <div class="two-columns">
        <div class="fields">
          <label for="tel">Telefono</label>
          <input type="number" id="tel" name="tel" autocomplete="off">  
        </div>

        <div class="fields">
          <label for="email">Correo</label>
          <input type="email" id="email" name="email" autocomplete="off">  
        </div>
    </div>
    
    <div class="fields radiobutton">
        <label for="hombre">Hombre</label>
        <input type="radio" name="sexo" id="hombre" value="Hombre">
        <label for="mujer">Mujer</label>
        <input type="radio" name="sexo" id="mujer" value="Mujer">
    </div>

    <div class="fields">
        <label for="coment">Comentarios</label>
        <textarea name="coment" id="coment"></textarea>
    </div>

    <div class="fields term">
        <label for="term">Terminos y condiciones</label>
        <input type="checkbox" name="term" id="term">
    </div>

    <div class="btn">
        <!--input type="submit" name="enviar" id="btn" value="Enviar"-->
        <button type="submit" name="enviar" id="btn" value="Enviar">Enviar</button>
    </div>
  </form>  
  <script src="../JS/validar_formulario.js"></script>       
</body>
</html>
